# Ublong — local infrastructure.
# Brings up MongoDB and the Python agents service.
# The Node backend and Next.js frontend run via npm (see README).
services:
  mongodb:
    image: mongo:7
    container_name: ublong-mongodb
    ports:
      - "27017:27017"
    volumes:
      - ublong_mongo_data:/data/db
    restart: unless-stopped

  agents:
    build: ./ublong-agents
    container_name: ublong-agents
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PORT=8000
    volumes:
      - ./ublong-agents/data:/app/data
    restart: unless-stopped

volumes:
  ublong_mongo_data:
